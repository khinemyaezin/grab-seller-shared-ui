name: Publish shared packages

on:
  workflow_dispatch:
    inputs:
      target_package:
        description: 'Select the package to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - '@khinemyaezin/seller-contracts'
          - '@khinemyaezin/seller-api'
          - '@khinemyaezin/seller-ui'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@khinemyaezin'

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run release:check

      - name: Publish all packages
        if: ${{ github.event.inputs.target_package == 'all' }}
        run: npm run publish:packages

      - name: Publish specific package
        if: ${{ github.event.inputs.target_package != 'all' }}
        run: npm publish --workspace ${{ github.event.inputs.target_package }}
